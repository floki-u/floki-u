name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate light and dark SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#397b99&color_dots=#eaf4f7,#cbe4ed,#8ecae6,#4f9dbd,#28627d
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#8ecae6&color_dots=#161b22,#214b5c,#28627d,#397b99,#8ecae6

      - name: Publish SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
